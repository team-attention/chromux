name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate package surface
        run: |
          node --check chromux.mjs
          bash -n test.sh
          bash -n apps/macos-status-bar/build.sh
          bash -n apps/macos-status-bar/package-release.sh
          node chromux.mjs help >/tmp/chromux-help.txt
          grep -q "wait-for-selector" /tmp/chromux-help.txt
          test -f skills/chromux/SKILL.md
          test -f skills/chromux-work/SKILL.md
          test ! -f SKILL.md
          node -e "const fs=require('fs'); const AsyncFunction=Object.getPrototypeOf(async function(){}).constructor; new AsyncFunction('cdp','js','sleep','waitLoad', fs.readFileSync('snippets/_builtin/scroll-until.js','utf8'));"
          npm pack --dry-run

      - name: Check Chrome availability
        run: |
          command -v google-chrome || command -v chromium-browser || command -v chromium

      - name: Run browser test suite
        env:
          HOME: ${{ runner.temp }}/chromux-home
          CHROMUX_EXTRA_CHROME_ARGS: --disable-dev-shm-usage --no-first-run --no-default-browser-check
        run: |
          mkdir -p "$HOME"
          bash ./test.sh

      - name: Upload chromux state on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chromux-state-${{ github.job }}
          path: ${{ runner.temp }}/chromux-home/.chromux
          if-no-files-found: ignore
