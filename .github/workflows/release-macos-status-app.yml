name: macOS Status App Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Package macOS app
        run: ./apps/macos-status-bar/package-release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromux-status-macos
          path: |
            apps/macos-status-bar/release/*.zip
            apps/macos-status-bar/release/*.sha256
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          assets=(apps/macos-status-bar/release/*.zip apps/macos-status-bar/release/*.sha256)
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --title "$TAG_NAME" \
              --notes "macOS status bar app release for chromux $TAG_NAME."
          fi
