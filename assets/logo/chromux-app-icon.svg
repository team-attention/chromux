<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">chromux app icon</title>
  <desc id="desc">macOS app icon for chromux: the cx brand mark on a rounded indigo square.</desc>

  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a76de"/>
      <stop offset="1" stop-color="#5058c7"/>
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- macOS icon grid: 824x824 rounded rect centered on a 1024 canvas -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#plate)" filter="url(#drop)"/>
  <rect x="100.5" y="100.5" width="823" height="823" rx="184.5" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1"/>

  <!-- brand mark -->
  <text x="512" y="642" text-anchor="middle" font-family="'SF Mono', ui-monospace, Menlo, Consolas, monospace" font-size="360" font-weight="700" fill="#ffffff">cx</text>
</svg>
