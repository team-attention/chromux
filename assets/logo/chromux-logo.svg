<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">chromux</title>
  <desc id="desc">chromux, the browser tool for agents. Dark brand lockup with parallel terminal panes.</desc>

  <!-- panel -->
  <rect x="1" y="1" width="1198" height="298" rx="16" fill="#0f1011" stroke="#23252a" stroke-width="2"/>

  <!-- brand mark -->
  <rect x="64" y="86" width="56" height="56" rx="12" fill="#5e6ad2"/>
  <text x="92" y="122" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" font-weight="700" fill="#ffffff">cx</text>

  <!-- wordmark -->
  <text x="140" y="134" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif" font-size="62" font-weight="650" letter-spacing="-2.2" fill="#f7f8f8">chromux</text>

  <!-- tagline -->
  <text x="66" y="188" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="400" letter-spacing="-0.2" fill="#d0d6e0">The best browser tool for agents.</text>

  <!-- caption -->
  <text x="66" y="228" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" fill="#8a8f98">parallel sessions&#160;&#160;&#183;&#160;&#160;self-learning replays&#160;&#160;&#183;&#160;&#160;zero dependencies</text>

  <!-- terminal card -->
  <g>
    <rect x="724" y="60" width="412" height="180" rx="12" fill="#141516" stroke="#23252a" stroke-width="1"/>
    <line x1="724" y1="96" x2="1136" y2="96" stroke="#23252a" stroke-width="1"/>
    <circle cx="748" cy="78" r="5" fill="#3e3e44"/>
    <circle cx="766" cy="78" r="5" fill="#34343a"/>
    <circle cx="784" cy="78" r="5" fill="#2b2d33"/>

    <line x1="862" y1="96" x2="862" y2="240" stroke="#23252a" stroke-width="1"/>
    <line x1="999" y1="96" x2="999" y2="240" stroke="#23252a" stroke-width="1"/>
    <line x1="724" y1="143" x2="1136" y2="143" stroke="#191a1b" stroke-width="1"/>

    <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
      <text x="748" y="124" font-size="13" fill="#5e6ad2">agent-1</text>
      <text x="886" y="124" font-size="13" fill="#5e6ad2">agent-2</text>
      <text x="1022" y="124" font-size="13" fill="#5e6ad2">agent-3</text>

      <text x="748" y="163" font-size="14" fill="#d0d6e0">open inbox</text>
      <text x="748" y="190" font-size="14" fill="#8a8f98">snap 42ms</text>
      <rect x="748" y="211" width="72" height="3" rx="1.5" fill="#5e6ad2"/>
      <rect x="824" y="211" width="16" height="3" rx="1.5" fill="#34343a"/>

      <text x="886" y="163" font-size="14" fill="#d0d6e0">click @3</text>
      <text x="886" y="190" font-size="14" fill="#8a8f98">diff 31ms</text>
      <rect x="886" y="211" width="84" height="3" rx="1.5" fill="#5e6ad2"/>
      <rect x="974" y="211" width="12" height="3" rx="1.5" fill="#34343a"/>

      <text x="1022" y="163" font-size="14" fill="#d0d6e0">replay flow</text>
      <text x="1022" y="190" font-size="14" fill="#8a8f98">0 model calls</text>
      <rect x="1022" y="211" width="76" height="3" rx="1.5" fill="#27a644"/>
      <rect x="1102" y="211" width="14" height="3" rx="1.5" fill="#34343a"/>
    </g>
  </g>
</svg>
