<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">chromux agent-native browser control plane</title>
  <desc id="desc">A real Chrome profile is routed through a deterministic control plane into three parallel agent sessions. A compact check motif shows verification in about 47 tokens, while a notes and replay stack represents site memory.</desc>

  <style>
    svg {
      --canvas: #0f1011;
      --surface: #141516;
      --surface-raised: #191a1b;
      --line: #23252a;
      --line-strong: #3e3e44;
      --grid: #191a1b;
      --ink: #f7f8f8;
      --muted: #d0d6e0;
      --subtle: #8a8f98;
      --amber: #E8A33D;
      --amber-soft: #6c501f;
      --accent-ink: #211606;
      --teal: #2fb98c;
    }

    .canvas { fill: var(--canvas); }
    .surface { fill: var(--surface); }
    .surface-raised { fill: var(--surface-raised); }
    .border { fill: none; stroke: var(--line); stroke-width: 1; }
    .border-strong { fill: none; stroke: var(--line-strong); stroke-width: 1; }
    .grid { stroke: var(--grid); stroke-width: 1; }
    .connector { fill: none; stroke: var(--amber); stroke-width: 2; stroke-linecap: square; stroke-linejoin: round; }
    .connector-muted { fill: none; stroke: var(--amber-soft); stroke-width: 1; stroke-linecap: square; }
    .ink { fill: var(--ink); }
    .muted { fill: var(--muted); }
    .subtle { fill: var(--subtle); }
    .accent { fill: var(--amber); }
    .accent-fill { fill: var(--amber); }
    .accent-ink { fill: var(--accent-ink); }
    .success { fill: none; stroke: var(--teal); stroke-width: 2.25; stroke-linecap: square; stroke-linejoin: round; }
    .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    .display { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; }

    @media (prefers-color-scheme: light) {
      svg {
        --canvas: #f3f5f7;
        --surface: #ffffff;
        --surface-raised: #e9edf0;
        --line: #c8d0d7;
        --line-strong: #9ca8b3;
        --grid: #e2e7eb;
        --ink: #192027;
        --muted: #4e5a65;
        --subtle: #697681;
        --amber: #9A5B05;
        --amber-soft: #c99a54;
        --accent-ink: #ffffff;
        --teal: #087a5a;
      }
    }
  </style>

  <defs>
    <clipPath id="panel-clip">
      <rect x="1" y="1" width="1198" height="358" rx="16"/>
    </clipPath>
  </defs>

  <rect class="canvas" x="1" y="1" width="1198" height="358" rx="16"/>
  <g clip-path="url(#panel-clip)">
    <!-- Structural terminal grid: aligns the profile, control plane, and session lanes. -->
    <g class="grid">
      <line x1="40" y1="84" x2="40" y2="326"/>
      <line x1="290" y1="84" x2="290" y2="326"/>
      <line x1="338" y1="84" x2="338" y2="326"/>
      <line x1="526" y1="84" x2="526" y2="326"/>
      <line x1="575" y1="84" x2="575" y2="326"/>
      <line x1="775" y1="84" x2="775" y2="326"/>
      <line x1="966" y1="84" x2="966" y2="326"/>
      <line x1="1157" y1="84" x2="1157" y2="326"/>
      <line x1="40" y1="110" x2="1157" y2="110"/>
      <line x1="40" y1="145" x2="1157" y2="145"/>
      <line x1="40" y1="264" x2="1157" y2="264"/>
      <line x1="40" y1="284" x2="1157" y2="284"/>
    </g>

    <!-- Header, matching the compact brand lockup and terminal DNA of the logo. -->
    <g transform="translate(40 28)">
      <rect class="accent-fill" x="0" y="0" width="34" height="34" rx="8"/>
      <text class="mono accent-ink" x="17" y="23" text-anchor="middle" font-size="14" font-weight="700">cx</text>
      <text class="display ink" x="48" y="25" font-size="28" font-weight="650" letter-spacing="-0.8">chromux</text>
      <text class="mono subtle" x="49" y="45" font-size="11" letter-spacing="0.45">AGENT-NATIVE BROWSER CONTROL PLANE</text>
    </g>
    <text class="mono subtle" x="1157" y="50" text-anchor="end" font-size="11">REAL CHROME / DETERMINISTIC CDP / LOCAL MEMORY</text>
    <line class="border" x1="40" y1="84" x2="1157" y2="84"/>

    <!-- One signed-in Chrome profile. -->
    <g>
      <rect class="surface" x="40" y="110" width="250" height="154" rx="12"/>
      <rect class="border" x="40.5" y="110.5" width="249" height="153" rx="11.5"/>
      <line class="border" x1="40" y1="145" x2="290" y2="145"/>
      <circle class="surface-raised" cx="59" cy="127" r="4"/>
      <circle class="surface-raised" cx="75" cy="127" r="4"/>
      <circle class="surface-raised" cx="91" cy="127" r="4"/>
      <text class="mono muted" x="108" y="131" font-size="11">YOUR REAL CHROME</text>

      <rect class="surface-raised" x="56" y="160" width="218" height="25" rx="5"/>
      <rect class="accent-fill" x="65" y="168" width="8" height="8" rx="1"/>
      <text class="mono muted" x="82" y="177" font-size="10.5">signed-in profile</text>
      <text class="mono subtle" x="252" y="177" text-anchor="end" font-size="10.5">local</text>

      <g class="mono" font-size="11">
        <text class="ink" x="58" y="208">inbox</text>
        <text class="subtle" x="58" y="228">docs</text>
        <text class="subtle" x="58" y="248">research</text>
        <line class="border" x1="126" y1="194" x2="126" y2="250"/>
        <text class="muted" x="142" y="208">one profile</text>
        <text class="subtle" x="142" y="228">persistent logins</text>
        <rect class="accent-fill" x="142" y="241" width="52" height="3" rx="1.5"/>
        <rect class="surface-raised" x="198" y="241" width="20" height="3" rx="1.5"/>
      </g>
    </g>

    <!-- Deterministic control plane and intentional fan-out. -->
    <path class="connector" d="M290 188H338"/>
    <path class="connector-muted" d="M314 180V196M322 180V196"/>
    <g>
      <rect class="surface" x="338" y="132" width="188" height="112" rx="8"/>
      <rect class="border-strong" x="338.5" y="132.5" width="187" height="111" rx="7.5"/>
      <text class="mono accent" x="356" y="157" font-size="11" font-weight="700" letter-spacing="0.35">RAW CDP</text>
      <text class="display ink" x="356" y="184" font-size="19" font-weight="600" letter-spacing="-0.35">control plane</text>
      <text class="mono muted" x="356" y="207" font-size="10.5">route  /  isolate  /  verify</text>
      <rect class="accent-fill" x="356" y="220" width="97" height="3" rx="1.5"/>
      <rect class="surface-raised" x="457" y="220" width="48" height="3" rx="1.5"/>
    </g>
    <path class="connector" d="M526 188H550V168H575"/>
    <path class="connector" d="M526 188H575"/>
    <path class="connector" d="M526 188H550V220H575"/>

    <!-- Three real, isolated agent session lanes. -->
    <g>
      <rect class="surface" x="575" y="110" width="582" height="154" rx="12"/>
      <rect class="border" x="575.5" y="110.5" width="581" height="153" rx="11.5"/>
      <line class="border" x1="575" y1="145" x2="1157" y2="145"/>
      <text class="mono muted" x="594" y="131" font-size="11">PARALLEL AGENT SESSIONS</text>
      <text class="mono subtle" x="1138" y="131" text-anchor="end" font-size="10.5">N ISOLATED TAB LANES</text>

      <g>
        <rect class="surface-raised" x="594" y="158" width="164" height="87" rx="6"/>
        <rect class="border" x="594.5" y="158.5" width="163" height="86" rx="5.5"/>
        <rect class="accent-fill" x="606" y="171" width="3" height="14" rx="1.5"/>
        <text class="mono muted" x="620" y="182" font-size="10.5">agent / alpha</text>
        <line class="border" x1="606" y1="194" x2="746" y2="194"/>
        <text class="mono ink" x="606" y="214" font-size="11">open / inbox</text>
        <text class="mono subtle" x="606" y="232" font-size="10.5">tab 01  ▋</text>
      </g>

      <g>
        <rect class="surface-raised" x="784" y="158" width="164" height="87" rx="6"/>
        <rect class="border" x="784.5" y="158.5" width="163" height="86" rx="5.5"/>
        <rect class="accent-fill" x="796" y="171" width="3" height="14" rx="1.5"/>
        <text class="mono muted" x="810" y="182" font-size="10.5">agent / bravo</text>
        <line class="border" x1="796" y1="194" x2="936" y2="194"/>
        <text class="mono ink" x="796" y="214" font-size="11">click / @3</text>
        <text class="mono subtle" x="796" y="232" font-size="10.5">tab 02  ▋</text>
      </g>

      <g>
        <rect class="surface-raised" x="974" y="158" width="164" height="87" rx="6"/>
        <rect class="border" x="974.5" y="158.5" width="163" height="86" rx="5.5"/>
        <rect class="accent-fill" x="986" y="171" width="3" height="14" rx="1.5"/>
        <text class="mono muted" x="1000" y="182" font-size="10.5">agent / charlie</text>
        <line class="border" x1="986" y1="194" x2="1126" y2="194"/>
        <text class="mono ink" x="986" y="214" font-size="11">run / replay</text>
        <text class="mono subtle" x="986" y="232" font-size="10.5">tab 03  ▋</text>
      </g>
    </g>

    <!-- Verification is deliberately compact: teal appears only on the successful check. -->
    <g>
      <rect class="surface" x="338" y="284" width="304" height="42" rx="8"/>
      <rect class="border" x="338.5" y="284.5" width="303" height="41" rx="7.5"/>
      <path class="success" d="M361 307l5 5 10-12"/>
      <text class="mono accent" x="392" y="302" font-size="12" font-weight="700">~47 TOKENS</text>
      <text class="mono muted" x="392" y="316" font-size="10.5">verify the action diff</text>
    </g>

    <!-- Notes and replays form a compact memory stack, so every visit can compound. -->
    <g>
      <rect class="surface" x="667" y="284" width="490" height="42" rx="8"/>
      <rect class="border" x="667.5" y="284.5" width="489" height="41" rx="7.5"/>
      <rect class="surface-raised" x="686" y="294" width="18" height="20" rx="2"/>
      <rect class="surface-raised" x="690" y="291" width="18" height="20" rx="2"/>
      <rect class="surface-raised" x="694" y="288" width="18" height="20" rx="2"/>
      <path class="connector" d="M708 288v7l-3-2-3 2v-7"/>
      <text class="mono accent" x="728" y="302" font-size="12" font-weight="700">SITE MEMORY</text>
      <text class="mono muted" x="728" y="316" font-size="10.5">notes + proven replays surface on the next visit</text>
    </g>
  </g>
  <rect class="border-strong" x="1.5" y="1.5" width="1197" height="357" rx="15.5"/>
</svg>
